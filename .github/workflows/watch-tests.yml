name: Watch App Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  GRADLE_OPTS: -Dorg.gradle.jvmargs="-Xmx2g -XX:MaxMetaspaceSize=512m"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Run JVM tests with parallel execution
        working-directory: examples/android/RunAnywhereWatch
        run: |
          ./gradlew :tests-jvm:test --no-daemon --stacktrace --parallel
          ./gradlew :tests-jvm:test --no-daemon --stacktrace --continue

      - name: Process test results
        working-directory: examples/android/RunAnywhereWatch
        run: |
          mkdir -p test-results
          cp -r tests-jvm/build/reports/tests/test/* test-results/ 2>/dev/null || true
          ls -la test-results/ 2>/dev/null || echo "No test results found"

      - name: Upload test results
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: examples/android/RunAnywhereWatch/test-results/
          retention-days: 30
          if-no-files-found: warn

      - name: Upload test report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-report
          path: examples/android/RunAnywhereWatch/tests-jvm/build/reports/tests/test/
          retention-days: 30
          if-no-files-found: warn

      - name: Verify test coverage
        working-directory: examples/android/RunAnywhereWatch
        run: |
          echo "Running coverage analysis..."
          ./gradlew :tests-jvm:test --no-daemon --continue || true
          echo "Coverage verification complete"

      - name: Post test summary
        if: always()
        run: |
          echo "## Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "- Tests executed: ${{ github.event_name == 'pull_request' && 'PR branch' || 'main branch' }}" >> $GITHUB_STEP_SUMMARY
          echo "- Java version: 17" >> $GITHUB_STEP_SUMMARY
          echo "- Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
